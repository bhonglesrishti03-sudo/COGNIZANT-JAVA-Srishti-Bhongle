<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Help - Community Event Portal</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f4f4f4;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background-color: white;
            padding: 30px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        h1 {
            color: #1f3864;
            border-bottom: 2px solid #2e74b5;
            padding-bottom: 10px;
        }

        h2 {
            color: #2e74b5;
            margin-top: 25px;
        }

        p, li {
            font-size: 15px;
            line-height: 1.7;
            color: #333;
        }

        a {
            color: #2e74b5;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .tip {
            background-color: #eaf3fb;
            border-left: 4px solid #2e74b5;
            padding: 10px 15px;
            margin: 15px 0;
            font-size: 14px;
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Help & Documentation</h1>

        <p>
            Welcome to the Help page for the
            <strong>Local Community Event Portal</strong>.
            
        </p>

    </div>

</body>
</html>
