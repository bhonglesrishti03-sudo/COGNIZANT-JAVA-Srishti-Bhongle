<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Image Gallery - Community Event Portal</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        h1 {
            color: #1f3864;
        }

        table {
            border-spacing: 15px;
        }

        /* Reusable class for all gallery images */
        .imageBorder {
            border: 2px solid #1f3864;
            padding: 5px;
            display: block;
        }

        td {
            text-align: center;
            font-weight: bold;
            color: #555;
        }

    </style>

</head>
<body>

    <nav>
        <a href="index.html">← Back to Portal</a>
    </nav>

    <h1>Community Event Gallery</h1>

    <table>

        <!-- Row 1 -->
        <tr>

            <td>
                <img
                    src="images/event1.jpg"
                    alt="Music Festival"
                    title="Music Festival"
                    width="200"
                    class="imageBorder">
                <p>Music Festival</p>
            </td>

            <td>
                <img
                    src="images/event2.jpg"
                    alt="Food Fair"
                    title="Food Fair"
                    width="200"
                    class="imageBorder">
                <p>Food Fair</p>
            </td>

            <td>
                <img
                    src="images/event3.jpg"
                    alt="Sports Meet"
                    title="Sports Meet"
                    width="200"
                    class="imageBorder">
                <p>Sports Meet</p>
            </td>

        </tr>

        <!-- Row 2 -->
        <tr>

            <td>
                <img
                    src="images/event4.jpg"
                    alt="Art Exhibition"
                    title="Art Exhibition"
                    width="200"
                    class="imageBorder">
                <p>Art Exhibition</p>
            </td>

            <td>
                <img
                    src="images/event5.jpg"
                    alt="Community Cleanup"
                    title="Community Cleanup"
                    width="200"
                    class="imageBorder">
                <p>Community Cleanup</p>
            </td>

            <td>
                <img
                    src="images/event6.jpg"
                    alt="Cultural Night"
                    title="Cultural Night"
                    width="200"
                    class="imageBorder">
                <p>Cultural Night</p>
            </td>

        </tr>

    </table>

</body>
</html>
