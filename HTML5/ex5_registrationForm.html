<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Registration Form - Community Event Portal</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f4f4f4;
        }

        h2 {
            color: #1f3864;
        }

        .container {
            width: 500px;
            margin: auto;
            background-color: white;
            padding: 25px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        label {
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 25px;
            background-color: #1f3864;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background-color: #2e74b5;
        }

        #result {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: green;
            font-size: 16px;
        }

    </style>

</head>
<body>

    <nav style="margin-bottom: 20px;">
        <a href="index.html" style="text-decoration:none; color:#2e74b5;">← Back to Portal</a>
    </nav>

    <div class="container">

        <section id="register">

            <h2>Event Registration</h2>

            <form onsubmit="showMessage(event)">

                <label>Name</label>
                <input
                    type="text"
                    placeholder="Enter your name"
                    required
                    autofocus>

                <label>Email</label>
                <input
                    type="email"
                    placeholder="Enter your email"
                    required>

                <label>Date</label>
                <input
                    type="date"
                    required>

                <label>Event Type</label>
                <select required>
                    <option value="">Select Event</option>
                    <option>Music Festival</option>
                    <option>Food Fair</option>
                    <option>Sports Meet</option>
                    <option>Art Exhibition</option>
                    <option>Community Cleanup</option>
                    <option>Cultural Night</option>
                </select>

                <label>Message</label>
                <textarea
                    rows="5"
                    placeholder="Enter your message">
                </textarea>

                <button type="submit">Register</button>

            </form>

            <!-- Semantic output element for result -->
            <output id="result"></output>

        </section>

    </div>

    <script>

        function showMessage(event) {
            event.preventDefault();
            document.getElementById("result").textContent =
                "Registration Successful! We will contact you shortly.";
        }

    </script>

</body>
</html>
