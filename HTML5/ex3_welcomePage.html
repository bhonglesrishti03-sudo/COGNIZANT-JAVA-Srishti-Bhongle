<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Welcome Banner - Community Event Portal</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 30px;
        }

        #welcomeBanner {
            background-color: #1f3864;
            color: white;
            padding: 20px;
            border-radius: 8px;
            font-size: 20px;
        }

       
        .highlight {
            background-color: yellow;
            padding: 5px;
        }

    </style>

</head>
<body>

    <nav>
        <a href="index.html">← Back to Portal</a>
    </nav>

    <!-- ID selector applied here -->
    <div id="welcomeBanner">

        Welcome Back, Resident!

        <!-- Inline style for special offer span -->
        <span style="color: #ff0000; font-weight: bold; margin-left: 15px;">
            Special Offer: Free Entry to Cultural Night!
        </span>

    </div>

    <!-- Class selector applied here -->
    <h2 class="highlight">Upcoming Events This Week</h2>

    <p>Check out what's happening in your community.</p>

</body>
</html>
